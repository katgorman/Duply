services:
  - type: web
    name: duply-backend
    runtime: python
    rootDir: backend
    plan: pro
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn main:app -k uvicorn.workers.UvicornWorker --workers 1 --timeout 300 --keep-alive 75 --bind 0.0.0.0:$PORT
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: DUPLY_BACKGROUND_MODEL_WARMUP
        value: "true"
      - key: PYTHONUNBUFFERED
        value: "1"
